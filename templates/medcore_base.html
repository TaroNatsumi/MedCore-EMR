<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCore Control | {% block title %}Главная{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        medcore: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                            950: '#082f49',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 font-sans text-slate-300 min-h-screen flex flex-col md:flex-row selection:bg-medcore-500 selection:text-white relative">

    <!-- Mobile Header -->
    <div class="md:hidden flex items-center justify-between p-4 bg-slate-900 border-b border-slate-800 sticky top-0 z-40 shadow-md">
        <h1 class="text-xl font-display font-bold text-white tracking-wide">MedCore <span class="text-medcore-500">Ctrl</span></h1>
        <button onclick="toggleMobileMenu()" class="p-2 text-slate-400 hover:text-white bg-slate-800 rounded-lg transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col h-screen fixed md:sticky top-0 left-0 shrink-0 z-50 shadow-2xl shadow-slate-950 -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <a href="{% url 'medcore_dashboard' %}">
                <h1 class="text-2xl font-display font-bold text-white tracking-wide">MedCore <span class="text-medcore-500">Ctrl</span></h1>
            </a>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'medcore_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium {% if request.resolver_match.url_name == 'medcore_dashboard' %}bg-medcore-500/10 text-medcore-400 border border-medcore-500/20{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                Список Больниц
            </a>
            
            <a href="{% url 'medcore_processing' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium {% if request.resolver_match.url_name == 'medcore_processing' %}bg-medcore-500/10 text-medcore-400 border border-medcore-500/20{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                Процессинг (Трекинг)
            </a>
            
            <a href="{% url 'medcore_global_db' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium {% if request.resolver_match.url_name == 'medcore_global_db' %}bg-medcore-500/10 text-medcore-400 border border-medcore-500/20{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                Глобальная База БД
            </a>
        </nav>
        
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3 mb-4 px-2 text-sm text-slate-400">
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center font-bold text-white uppercase">{{ request.user.full_name|slice:":1" }}</div>
                <div class="truncate">
                    <p class="font-bold text-white truncate">{{ request.user.full_name }}</p>
                    <p class="text-[10px] uppercase tracking-wider text-medcore-400">Суперадмин</p>
                </div>
            </div>
            <a href="{% url 'medcore_logout' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 hover:border-red-500/20 border border-transparent transition-all font-bold text-sm">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                Выйти
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-x-hidden relative">
        <!-- Decor -->
        <div class="absolute top-[-20%] left-[20%] w-[50%] h-[40%] bg-medcore-900/10 rounded-full blur-[100px] pointer-events-none"></div>
        
        <div class="p-8 max-w-7xl mx-auto relative z-10">
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-6 p-4 rounded-xl text-sm font-bold flex items-center gap-3 {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">
                        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
